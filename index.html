<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moeda</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <main>
        <h1>Conversor de Moeda</h1>

        <div class="container_top">

            <p class="paragrafo_1">Conversor de</p>

            <select class="currency">
                <option value="real">R$ Real brasileiro</option>
                <option value="dolar">US$ Dólar americano</option>
                <option value="euro">€ Euro</option>
                <option value="bitcoin">BTC Bitcoin</option>
            </select>

            <p class="paragrafo_2">Converter para</p>
            <select class="currency-converted">
                <option value="real">R$ Real brasileiro</option>
                <option value="dolar">US$ Dólar americano</option>
                <option value="euro">€ Euro</option>
                <option value="bitcoin">BTC Bitcoin</option>
            </select>

            <p class="paragrafo_3">Valor</p>
            <input class="input_value" type="price" placeholder="Digite o valor a ser convertido">
            <button class="converter-button">Converter</button>
        </div>
        <div class="container_bottom">

            <div class="flags">
                <img src="img/brasil 2.png" alt="brazil_flag">
                <p class="paragrafo_4">Real</p>
                <input class="input_value_1" type="price" disabled value="R$ 0.00">
            </div>

            <div class="flags">
                <img src="img/estados-unidos (1) 1.png" alt="eua_flag">
                <p class="paragrafo_5">Dólar Americano</p>
                <input class="input_value_2" type="price" disabled value="US$ 0.00">
            </div>
        </div>
    </main>
</body>
<script src="./scripts.js"></script>
</html>
